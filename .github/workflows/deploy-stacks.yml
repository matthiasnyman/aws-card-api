name: Deploy Stacks

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment (dev, staging, prod)'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod
      artifacts_bucket_suffix:
        description: 'S3 bucket suffix if default exists (e.g. -v2)'
        required: false
        default: ''
        type: string

env:
  AWS_REGION: eu-north-1

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Deploy Database stack
        run: |
          aws cloudformation deploy \
            --stack-name ${{ github.event.inputs.environment }}-mobile-api-db \
            --template-file infra/database.yaml \
            --parameter-overrides Environment=${{ github.event.inputs.environment }}

      - name: Deploy S3 stack
        run: |
          aws cloudformation deploy \
            --stack-name ${{ github.event.inputs.environment }}-mobile-api-s3 \
            --template-file infra/s3.yaml \
            --parameter-overrides Environment=${{ github.event.inputs.environment }} ArtifactsBucketSuffix=${{ github.event.inputs.artifacts_bucket_suffix || '' }}

      - name: Build Lambda
        run: npm run build

      - name: Upload Lambda to S3
        run: |
          zip -r lambda.zip dist node_modules package.json
          BUCKET="${{ github.event.inputs.environment }}-mobile-api-artifacts${{ github.event.inputs.artifacts_bucket_suffix || '' }}"
          aws s3 cp lambda.zip s3://${BUCKET}/lambda.zip

      - name: Deploy Lambda stack
        run: |
          aws cloudformation deploy \
            --stack-name ${{ github.event.inputs.environment }}-mobile-api-lambda \
            --template-file infra/lambda.yaml \
            --parameter-overrides Environment=${{ github.event.inputs.environment }} \
            --capabilities CAPABILITY_NAMED_IAM

      - name: Deploy API Gateway stack
        run: |
          aws cloudformation deploy \
            --stack-name ${{ github.event.inputs.environment }}-mobile-api-api \
            --template-file infra/api.yaml \
            --parameter-overrides Environment=${{ github.event.inputs.environment }} \
            --capabilities CAPABILITY_NAMED_IAM
